server {
  listen 80;
  server_name _;

  location /ws {
    proxy_pass http://app:8080/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
  }

  location /api/ {
    proxy_pass http://app:8080/api/;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://app:8080/;
    proxy_set_header Host $host;
  }
}
